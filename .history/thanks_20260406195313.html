<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תודה! | קבוצת האקווריום</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wa-green: #25D366;
      --blue-mid: #2E86C1;
      --blue-ghost: #EBF5FB;
      --text-dark: #1A3A4A;
      --text-soft: #5D8AA8;
      --font: 'Heebo', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font);
      background: linear-gradient(160deg, #EBF5FB 0%, #D6EAF8 100%);
      color: var(--text-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 48px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(46,134,193,.12);
    }
    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.15));
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: 12px;
      color: var(--text-dark);
    }
    .subtitle {
      font-size: 1rem;
      color: var(--text-soft);
      line-height: 1.65;
      margin-bottom: 32px;
    }
    .btn-wa {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--wa-green);
      color: #fff;
      font-family: var(--font);
      font-weight: 700;
      font-size: 1.05rem;
      padding: 16px 32px;
      border-radius: 9999px;
      text-decoration: none;
      width: 100%;
      box-shadow: 0 4px 20px rgba(37,211,102,.30);
      transition: transform 200ms ease, box-shadow 200ms ease;
      margin-bottom: 16px;
    }
    .btn-wa:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(37,211,102,.40);
    }
    .btn-wa svg { width: 22px; height: 22px; flex-shrink: 0; }

    /* countdown ring */
    .countdown-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 28px;
    }
    .countdown-ring {
      position: relative;
      width: 64px;
      height: 64px;
    }
    .countdown-ring svg { transform: rotate(-90deg); }
    .countdown-ring circle {
      fill: none;
      stroke-width: 4;
    }
    .ring-bg { stroke: var(--blue-ghost); }
    .ring-fill {
      stroke: var(--wa-green);
      stroke-linecap: round;
      stroke-dasharray: 163; /* 2π×26 */
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .countdown-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text-dark);
    }
    .countdown-label {
      font-size: .8rem;
      color: var(--text-soft);
    }

    .back-link {
      font-size: .82rem;
      color: var(--text-soft);
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) { .pulse { animation: none; } }
  </style>
</head>

    const ring = document.getElementById('ring');
    const countdownEl = document.getElementById('countdown');
    const secText = document.getElementById('sec-text');
    const TOTAL = 5;
    const CIRCUMFERENCE = 163; // 2π×26

    let remaining = TOTAL;
    ring.style.strokeDashoffset = 0;

    const tick = () => {
      remaining--;
      countdownEl.textContent = remaining;
      if (secText) secText.textContent = remaining;
      const progress = (TOTAL - remaining) / TOTAL;
      ring.style.strokeDashoffset = CIRCUMFERENCE * progress;

      if (remaining <= 0) {
        clearInterval(timer);
        window.location.href = WA_URL;
      }
    };

    // Don't auto-redirect if user prefers reduced motion
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let timer;
    if (!prefersReduced) {
      timer = setInterval(tick, 1000);
    } else {
      // Hide countdown, just show button
      document.querySelector('.countdown-wrap').style.display = 'none';
      document.querySelector('.subtitle').innerHTML = 'לחצו על הכפתור להצטרפות לקבוצה.';
    }

    // Track click
    document.getElementById('wa-btn').addEventListener('click', () => {
      clearInterval(timer);
      // gtag('event', 'whatsapp_join_click', { cta_position: 'thanks_manual' });
    });
  </script>
</body>
</html>
